# Kubernetes ConfigMap and Secrets
# kubectl apply -f configmap.yml

# ============================================================
# ConfigMap (non-sensitive configuration)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: rails-config
data:
  RAILS_ENV: production
  RAILS_LOG_TO_STDOUT: "true"
  RAILS_SERVE_STATIC_FILES: "true"
  RAILS_MAX_THREADS: "5"
  WEB_CONCURRENCY: "2"

---
# ============================================================
# Secret (sensitive data)
# ============================================================
# Create with:
# kubectl create secret generic rails-secrets \
#   --from-literal=database-url='postgres://user:pass@host:5432/db' \
#   --from-literal=master-key='your-master-key' \
#   --from-literal=redis-url='redis://host:6379'

apiVersion: v1
kind: Secret
metadata:
  name: rails-secrets
type: Opaque
stringData:
  database-url: postgres://user:password@postgres:5432/production
  master-key: your-rails-master-key
  redis-url: redis://redis:6379/0
  # Add other secrets as needed
  # sentry-dsn: https://xxx@sentry.io/xxx
  # aws-access-key-id: xxx
  # aws-secret-access-key: xxx

---
# ============================================================
# PersistentVolumeClaim (for storage)
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rails-storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
# ============================================================
# NetworkPolicy (security)
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rails-app-network-policy
spec:
  podSelector:
    matchLabels:
      app: rails-app
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379

